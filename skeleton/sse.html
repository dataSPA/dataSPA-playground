---
loop: true
interval: 2000
---

<section id="content">
    <h2>Live Updates</h2>
    <p>SSE Message count: <strong>{{.SSEMessageCount}}</strong></p>
    <p>Loop counter: <strong>{{.LoopCounter}}</strong></p>
    <p>Global hits counter: <strong>{{.GlobalHits}}</strong></p>
    <p>
        💬 Message:
        <em>{{if .Signals.message}}{{.Signals.message}}{{else}}none{{end}}</em>
    </p>
</section>
